# Render Blueprint — TrekRank backend.
#
# The API and the Celery worker run in ONE web service (via backend/start.sh)
# so they share a disk. The EXIF photo pipeline depends on the worker being able
# to read the photo the API just saved — separate services with separate disks
# would break geolocation. (For durable storage later, switch STORAGE_BACKEND to
# S3/R2 and you can split them into independent services.)
#
# Deploy: push this repo to GitHub, then in Render: New → Blueprint → pick the repo.

databases:
  - name: trekrank-db
    databaseName: trekrank
    user: trek
    plan: free

services:
  - type: keyvalue            # Render's managed Redis (broker + cache)
    name: trekrank-redis
    plan: free
    ipAllowList: []           # internal-only
    maxmemoryPolicy: noeviction

  - type: web
    name: trekrank-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh start.sh   # runs migrations + seeds + Celery worker + uvicorn
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trekrank-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: trekrank-redis
          property: connectionString
      - key: STORAGE_BACKEND
        value: local
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      # Nominatim asks for a descriptive UA with contact info — set your email.
      - key: GEOCODE_USER_AGENT
        value: "TrekRank/1.0 (your-email@example.com)"
      # After the first deploy, set this to the service's public URL,
      # e.g. https://trekrank-api.onrender.com  (used to build photo URLs).
      - key: PUBLIC_BASE_URL
        sync: false
